<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bridge JS Interface Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
<div id="app">
  <div class="center-box">
    <h1>{{ message }}</h1>
    <p v-if="bridgeAvailable"><strong>window.Bridge keys:</strong></p>
    <p v-else style="color:red">Bridge interface not available.</p>
    <ul v-if="bridgeAvailable">
      <li v-for="key in bridgeKeys" :key="key">{{ key }}</li>
    </ul>
  </div>
</div>

</body>
</html>
